name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            cd /var/www/leads/leads

            git pull origin main

            npm ci

            npm run build

            rm -rf /var/www/leads/build/*

            cp -r dist/* /var/www/leads/build/

            sudo nginx -t

            sudo systemctl reload nginx